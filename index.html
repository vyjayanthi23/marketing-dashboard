<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6fb;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 1.3rem; font-weight: 600; letter-spacing: 0.5px; }
    header span { font-size: 0.8rem; opacity: 0.55; }

    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* Summary cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .card .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #888;
      margin-bottom: 8px;
    }

    .card .value {
      font-size: 1.9rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .card .sub {
      font-size: 0.78rem;
      color: #aaa;
      margin-top: 4px;
    }

    .card.accent { background: #5c6bc0; color: white; }
    .card.accent .label, .card.accent .sub { color: rgba(255,255,255,0.65); }
    .card.accent .value { color: white; }

    /* Charts row */
    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    @media (max-width: 700px) { .charts { grid-template-columns: 1fr; } }

    .chart-box {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .chart-box h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 18px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .chart-box canvas { max-height: 260px; }

    /* Campaign table */
    .table-box {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      overflow-x: auto;
    }

    .table-box h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 18px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th {
      text-align: left;
      padding: 8px 12px;
      color: #999;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #f0f0f0;
    }
    td { padding: 12px 12px; border-bottom: 1px solid #f7f7f7; }
    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge.active { background: #e8f5e9; color: #2e7d32; }
    .badge.paused { background: #fafafa; color: #999; border: 1px solid #eee; }

    .channel-pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      background: #ede7f6;
      color: #5c35a0;
      font-weight: 500;
    }

    .bar-inline {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bar-inline .track {
      flex: 1;
      height: 6px;
      background: #f0f0f0;
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-inline .fill {
      height: 100%;
      background: #5c6bc0;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    #loading {
      text-align: center;
      padding: 80px;
      color: #aaa;
      font-size: 0.9rem;
    }

    #dashboard { display: none; }
  </style>
</head>
<body>

<header>
  <h1>Marketing Campaign Dashboard</h1>
  <span id="refresh-time">Loading...</span>
</header>

<div class="container">
  <div id="loading">Loading data...</div>
  <div id="dashboard">

    <div class="cards" id="summary-cards"></div>

    <div class="charts">
      <div class="chart-box">
        <h2>Reach by Campaign</h2>
        <canvas id="reach-chart"></canvas>
      </div>
      <div class="chart-box">
        <h2>7-Day Reach Trend (Active)</h2>
        <canvas id="trend-chart"></canvas>
      </div>
    </div>

    <div class="table-box">
      <h2>Campaign Breakdown</h2>
      <table>
        <thead>
          <tr>
            <th>Campaign</th>
            <th>Channel</th>
            <th>Status</th>
            <th>Reach</th>
            <th>CTR</th>
            <th>Conversions</th>
            <th>Reach %</th>
          </tr>
        </thead>
        <tbody id="campaign-table"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
  const COLORS = ["#5c6bc0","#26a69a","#ef5350","#ffa726","#ab47bc"];
  const fmt = n => n >= 1_000_000
    ? (n / 1_000_000).toFixed(1) + "M"
    : n >= 1_000 ? (n / 1_000).toFixed(1) + "K" : n;

  fetch("data/metrics.json")
    .then(r => r.json())
    .then(data => {
      document.getElementById("loading").style.display = "none";
      document.getElementById("dashboard").style.display = "block";

      const ts = new Date(data.generated_at);
      document.getElementById("refresh-time").textContent =
        "Last updated: " + ts.toLocaleString("en-US", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" });

      renderCards(data.summary);
      renderReachChart(data.campaigns);
      renderTrendChart(data.campaigns);
      renderTable(data.campaigns);
    })
    .catch(() => {
      document.getElementById("loading").textContent =
        "Could not load data/metrics.json — run generate_data.py first.";
    });

  function renderCards(s) {
    const cards = [
      { label: "Total Reach", value: fmt(s.total_reach), sub: `${s.active_campaigns} active campaigns`, accent: true },
      { label: "Impressions", value: fmt(s.total_impressions), sub: "across active campaigns" },
      { label: "Total Clicks", value: fmt(s.total_clicks), sub: `CTR ${(s.avg_ctr * 100).toFixed(2)}%` },
      { label: "Conversions", value: fmt(s.total_conversions), sub: "from active campaigns" },
    ];
    document.getElementById("summary-cards").innerHTML = cards.map(c => `
      <div class="card ${c.accent ? "accent" : ""}">
        <div class="label">${c.label}</div>
        <div class="value">${c.value}</div>
        <div class="sub">${c.sub}</div>
      </div>
    `).join("");
  }

  function renderReachChart(campaigns) {
    const ctx = document.getElementById("reach-chart").getContext("2d");
    const labels = campaigns.map(c => c.name.length > 22 ? c.name.slice(0, 22) + "…" : c.name);
    new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [{
          data: campaigns.map(c => c.reach),
          backgroundColor: campaigns.map((_, i) => COLORS[i % COLORS.length] + "cc"),
          borderColor: campaigns.map((_, i) => COLORS[i % COLORS.length]),
          borderWidth: 1.5,
          borderRadius: 6,
        }]
      },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11 } } },
          y: { grid: { color: "#f0f0f0" }, ticks: { callback: v => fmt(v), font: { size: 11 } } }
        }
      }
    });
  }

  function renderTrendChart(campaigns) {
    const active = campaigns.filter(c => c.status === "Active");
    const dates = active[0]?.daily_trend.map(d => d.date) ?? [];
    const ctx = document.getElementById("trend-chart").getContext("2d");
    new Chart(ctx, {
      type: "line",
      data: {
        labels: dates.map(d => {
          const [, m, day] = d.split("-");
          return `${parseInt(m)}/${parseInt(day)}`;
        }),
        datasets: active.map((c, i) => ({
          label: c.name.length > 20 ? c.name.slice(0, 20) + "…" : c.name,
          data: c.daily_trend.map(d => d.reach),
          borderColor: COLORS[i % COLORS.length],
          backgroundColor: COLORS[i % COLORS.length] + "18",
          tension: 0.4,
          fill: false,
          pointRadius: 3,
        }))
      },
      options: {
        plugins: { legend: { position: "bottom", labels: { font: { size: 11 }, boxWidth: 12 } } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11 } } },
          y: { grid: { color: "#f0f0f0" }, ticks: { callback: v => fmt(v), font: { size: 11 } } }
        }
      }
    });
  }

  function renderTable(campaigns) {
    const maxReach = Math.max(...campaigns.map(c => c.reach));
    const tbody = document.getElementById("campaign-table");
    tbody.innerHTML = campaigns.map((c, i) => `
      <tr>
        <td style="font-weight:500">${c.name}</td>
        <td><span class="channel-pill">${c.channel}</span></td>
        <td><span class="badge ${c.status.toLowerCase()}">${c.status}</span></td>
        <td>${fmt(c.reach)}</td>
        <td>${(c.ctr * 100).toFixed(2)}%</td>
        <td>${fmt(c.conversions)}</td>
        <td>
          <div class="bar-inline">
            <div class="track"><div class="fill" style="width:${Math.round(c.reach/maxReach*100)}%;background:${COLORS[i%COLORS.length]}"></div></div>
            <span style="font-size:0.75rem;color:#999;min-width:36px">${Math.round(c.reach/maxReach*100)}%</span>
          </div>
        </td>
      </tr>
    `).join("");
  }
</script>

</body>
</html>
