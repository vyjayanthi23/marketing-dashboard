name: Refresh Dashboard Data

on:
  schedule:
    - cron: "0 8 * * *"   # runs every day at 8:00 AM UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed so the job can commit back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate mock data
        run: python generate_data.py

      - name: Commit updated metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/metrics.json
          git diff --cached --quiet || git commit -m "chore: refresh dashboard data [$(date -u '+%Y-%m-%d')]"
          git push
